<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CV Maze Game</title>
<style>
  :root {
    --panel-bg: rgba(255,255,255,0.9);
    --text: #111827;
    --accent: #2563eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top, #f3f4f6 0%, #e5e7eb 40%, #d1d5db 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 18px;
  }
  .panel {
    width: min(1000px, 96vw);
    background: var(--panel-bg);
    backdrop-filter: blur(8px);
    border-radius: 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    padding: 14px 16px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: clamp(24px, 4vw, 38px);
  }
  p {
    margin: 6px 0;
    line-height: 1.45;
  }
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-weight: 700;
    margin-top: 8px;
  }
  .badge {
    background: #eef2ff;
    border: 1px solid #c7d2fe;
    color: #3730a3;
    padding: 6px 10px;
    border-radius: 999px;
  }
  .wrap {
    position: relative;
    width: min(1000px, 96vw);
    background: white;
    border-radius: 18px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  .mobile {
    font-size: 14px;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <section class="panel">
    <h1>CV Maze Game</h1>
    <p>Use <strong>Arrow keys</strong> or <strong>WASD</strong> to guide the blue player from the <strong>green start</strong> to the <strong>gold finish</strong>. Dark parts of the image act as walls.</p>
    <p class="mobile">On touch screens: tap anywhere inside the maze, then use the on-screen direction buttons.</p>
    <div class="stats">
      <div class="badge" id="moves">Moves: 0</div>
      <div class="badge" id="timer">Time: 0.0s</div>
      <div class="badge" id="status">Status: Ready</div>
    </div>
  </section>

  <div class="wrap">
    <canvas id="game"></canvas>
  </div>

  <section class="panel">
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button onclick="moveTap(0,-1)">↑</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;">
      <button onclick="moveTap(-1,0)">←</button>
      <button onclick="restart()">Restart</button>
      <button onclick="moveTap(1,0)">→</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;">
      <button onclick="moveTap(0,1)">↓</button>
    </div>
  </section>

    y = Math.max(0, Math.min(world.height - 1, Math.round(y)));
    const idx = (y * world.width + x) * 4;
    const data = world.imageData.data;
    return (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
  }

  function canMoveTo(x, y) {
    const r = world.player.r;
    const samplePoints = [
      [0, 0], [r, 0], [-r, 0], [0, r], [0, -r],
      [r * 0.7, r * 0.7], [r * 0.7, -r * 0.7],
      [-r * 0.7, r * 0.7], [-r * 0.7, -r * 0.7]
    ];
    for (const [dx, dy] of samplePoints) {
      const bx = brightnessAt(x + dx, y + dy);
      if (bx < 150) return false;
    }
    return true;
  }

  function drawMarker(x, y, color, label) {
    ctx.save();
    ctx.beginPath();
    ctx.fillStyle = color;
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 4;
    ctx.strokeStyle = "white";
    ctx.stroke();
    ctx.fillStyle = "white";
    ctx.font = "bold 12px Arial";
    ctx.textAlign = "center";
    ctx.fillText(label, x, y + 4);
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);

    drawMarker(world.start.x, world.start.y, "#22c55e", "S");
    drawMarker(world.goal.x, world.goal.y, "#f59e0b", "F");

    ctx.save();
    ctx.beginPath();
    ctx.fillStyle = "#2563eb";
    ctx.arc(world.player.x, world.player.y, world.player.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = "white";
    ctx.stroke();
    ctx.restore();
  }

  function tryMove(dx, dy) {
    if (world.won) return;
    if (!world.startedAt) world.startedAt = performance.now();

    const nextX = world.player.x + dx * world.player.speed;
    const nextY = world.player.y + dy * world.player.speed;

    if (canMoveTo(nextX, nextY)) {
      world.player.x = nextX;
      world.player.y = nextY;
      world.moves += 1;
      const dist = Math.hypot(world.player.x - world.goal.x, world.player.y - world.goal.y);
      if (dist <= world.goal.r + world.player.r) {
        world.won = true;
      }
    }

    updateHud();
    draw();
  }

  function gameLoop() {
    let dx = 0, dy = 0;
    if (world.keys.has("arrowup") || world.keys.has("w")) dy -= 1;
    if (world.keys.has("arrowdown") || world.keys.has("s")) dy += 1;
    if (world.keys.has("arrowleft") || world.keys.has("a")) dx -= 1;
    if (world.keys.has("arrowright") || world.keys.has("d")) dx += 1;

    if (dx || dy) {
      const len = Math.hypot(dx, dy) || 1;
      tryMove(dx / len, dy / len);
    } else {
      updateHud();
    }
    requestAnimationFrame(gameLoop);
  }

  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (["arrowup","arrowdown","arrowleft","arrowright","w","a","s","d"," "].includes(k)) e.preventDefault();
    if (k === " ") restart();
    world.keys.add(k);
  });
  window.addEventListener("keyup", (e) => world.keys.delete(e.key.toLowerCase()));
  window.addEventListener("resize", resize);

  window.moveTap = (dx, dy) => {
    for (let i = 0; i < 18; i++) tryMove(dx, dy);
  };

  img.onload = () => {
    canvas.width = world.width;
    canvas.height = world.height;
    ctx.drawImage(img, 0, 0);
    world.imageData = ctx.getImageData(0, 0, world.width, world.height);
    resize();
    restart();
    requestAnimationFrame(gameLoop);
  };
})();
</script>
</body>
</html>
